<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StayBliss - Book Your Stay</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">Stay<span>Bliss</span></a>
      <a id="backToHotel" href="index.html" class="back-link">← Back to Hotel</a>
    </div>
  </header>

  <main class="container">
    <div id="bookingPage" class="booking-layout">

      <div class="booking-hotel-card" id="hotelSummary">
        <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
      </div>

      <div class="booking-form-wrap">
        <h2>Complete Your Booking</h2>

        <div id="successMsg" class="success-banner" style="display:none;">
          🎉 Booking confirmed! We'll send details to your email.
        </div>

        <div class="form-section">
          <h3>Guest Details</h3>
          <div class="form-row">
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" id="firstName" placeholder="Anjali" />
            </div>
            <div class="form-group">
              <label>Last Name *</label>
              <input type="text" id="lastName" placeholder="Sharma" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
              <label>Phone *</label>
              <input type="tel" id="phone" placeholder="+91 98765 43210" />
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3>Stay Details</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Check-in Date *</label>
              <input type="date" id="checkin" />
            </div>
            <div class="form-group">
              <label>Check-out Date *</label>
              <input type="date" id="checkout" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Rooms</label>
              <select id="rooms">
                <option value="1">1 Room</option>
                <option value="2">2 Rooms</option>
                <option value="3">3 Rooms</option>
                <option value="4">4 Rooms</option>
              </select>
            </div>
            <div class="form-group">
              <label>Guests</label>
              <select id="guests">
                <option value="1">1 Guest</option>
                <option value="2">2 Guests</option>
                <option value="3">3 Guests</option>
                <option value="4">4 Guests</option>
                <option value="5">5+ Guests</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3>Special Requests</h3>
          <div class="form-group">
            <label>Any special requirements? (Optional)</label>
            <textarea id="specialRequests" rows="3" placeholder="e.g. early check-in, ground floor room, vegetarian meals..."></textarea>
          </div>
        </div>

        <div class="price-summary" id="priceSummary">
          <h3>Price Summary</h3>
          <div class="price-row"><span>Room price / night</span><span id="pricePerNight">-</span></div>
          <div class="price-row"><span>No. of nights</span><span id="numNights">-</span></div>
          <div class="price-row"><span>Rooms</span><span id="numRooms">1</span></div>
          <hr />
          <div class="price-row"><span>Subtotal</span><span id="subtotal">-</span></div>
          <div class="price-row"><span>Taxes & Fees (12%)</span><span id="taxes">-</span></div>
          <hr />
          <div class="price-row total-row"><span>Total</span><span id="grandTotal">-</span></div>
        </div>

        <div id="formError" class="form-error" style="display:none;"></div>
        <button id="submitBtn" class="submit-btn">Confirm Booking</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 StayBliss. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
